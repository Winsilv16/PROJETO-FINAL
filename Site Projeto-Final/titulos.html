<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>CBF - Títulos</title>

    <style>
        body {
            margin: 0;
            background-color: #002776;
            color: white;
            text-align: center;
            font-family: Arial;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #FFCC00;
            padding: 15px 30px;
        }

        .header-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        .logo {
            width: 70px;
        }

        .menu {
            display: flex;
            gap: 15px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .menu a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            background-color: #009739;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .menu a:hover {
            background-color: #007a2f;
        }

        main {
            flex: 1;
        }

        img {
            width: 200px;
            border-radius: 10px;
        }

        .trofeus {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .trofeu {
            text-align: center;
        }

        .trofeu p {
            font-size: 20px;
            font-weight: bold;
        }

        footer {
            background-color: #009739;
            padding: 10px;
            margin-top: auto;
        }
    </style>
</head>

<body>

<header>
    <div class="header-container">

        <a href="index.html">
            <img src="imagens/logo.png" class="logo">
        </a>

        <nav class="menu">
            <a href="index.html">Início</a>
            <a href="maiores_jogadores.html">Maiores Jogadores</a>
            <a href="curiosidades.html">Curiosidades</a>
        </nav>

    </div>
</header>

<main>

    <h1>TÍTULOS</h1>

    <h2>Taça Jules Rimet</h2>

    <div class="trofeus">

        <div class="trofeu">
            <img src="imagens/taca_antiga.png">
            <p>1958</p>
        </div>

        <div class="trofeu">
            <img src="imagens/taca_antiga.png">
            <p>1962</p>
        </div>

        <div class="trofeu">
            <img src="imagens/taca_antiga.png">
            <p>1970</p>
        </div>

    </div>

    <h2>Atual Taça da Copa do Mundo</h2>

    <div class="trofeus">

        <div class="trofeu">
            <img src="imagens/taca_copa.png">
            <p>1994</p>
        </div>

        <div class="trofeu">
            <img src="imagens/taca_copa.png">
            <p>2002</p>
        </div>

    </div>

</main>

<footer>
    <p>2025 IFRN - Todos os direitos reservados</p>
</footer>

</body>
</html>
