<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Títulos</title>

    <style>
        body {
            margin: 0;
            background-color: #002776;
            color: white;

        header {
            background-color: #FFCC00;
            padding: 15px 30px;
        }

        .header-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        .logo {
            width: 70px;
            height: auto;
        }

        .menu {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;

            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .menu a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            transition: 0.3s;
        }

        .menu a:hover {
            color: white;
        }

        img {
            width: 200px;
            border-radius: 10px;
        }

        .trofeus {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .trofeu {
            text-align: center;
        }

        .trofeu p {
            font-size: 20px;
            font-weight: bold;
        }

        footer {
            background-color: #009739;
            padding: 10px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <header>

        <div class="header-container">

            <a href="index.html">
                <img src="imagens/logo.png" alt="Logo da CBF" class="logo">
