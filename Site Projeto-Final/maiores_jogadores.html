<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Maiores Jogadores</title>

    <style>
        body {
            margin: 0;
            background-color: #002776;
            color: white;
            font-family: Arial, sans-serif;

            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #FFCC00;
            padding: 15px 30px;
        }

        .header-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        .logo {
            width: 70px;
            height: auto;
        }

        .menu {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;

            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .menu a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            transition: 0.3s;
        }

        .menu a:hover {
            color: white;
        }

        main {
            flex: 1;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
        }

        .player {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 30px;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
        }

        .player img {
            width: 200px;
            border-radius: 10px;
        }

        footer {
            background-color: #009739;
            padding: 10px;
            text-align: center;
            margin-top: auto;
        }
    </style>
</head>

<body>

    <header>

        <div class="header-container">

            <a href="index.html">
                <img src="imagens/logo.png" alt="Logo da CBF" class="logo">
            </a>

            <nav class="menu">
                <a href="index.html">Início</a>
                <a href="titulos.html">Títulos</a>
                <a href="maiores_jogadores.html">Jogadores</a>
                <a href="curiosidades.html">Curiosidades</a>
            </nav>

        </div>

    </header>

    <main>

        <h1>Maiores Jogadores</h1>

        <div class="player">

            <img src="imagens/pele.jpg" alt="Pelé">

            <div>
                <h2>Pelé</h2>
                <p>Pelé venceu 3 Copas do Mundo.</p>
            </div>

        </div>

        <div class="player">

            <img src="imagens/ronaldo.jpg" alt="Ronaldo">

            <div>
                <h2>Ronaldo Fenômeno</h2>
                <p>Ronaldo foi campeão mundial em 2002.</p>
            </div>

        </div>

        <div class="player">

            <img src="imagens/neymar.jpg" alt="Neymar">

            <div>
                <h2>Neymar</h2>
                <p>Neymar é um dos maiores destaques recentes da seleção.</p>
            </div>

        </div>

    </main>

    <footer>
        <p>2025 IFRN</p>
    </footer>

</body>

</html>
