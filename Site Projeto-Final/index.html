<!DOCTYPE html>
<html lang="pt-br">

<head>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #002776;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        header {
            background-color: #FFCC00;
            padding: 15px 30px;
        }

        .header-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        .logo {
            width: 70px;
            height: auto;
        }

        .menu {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;

            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .menu a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            transition: 0.3s;
        }

        .menu a:hover {
            color: white;
        }

        .container {
            margin: 40px auto;
            width: 90%;
        }

        .main-image {
            width: 80%;
            border-radius: 10px;
            margin-top: 20px;
        }

        footer {
            background-color: #009739;
            padding: 10px;

        }

</head>

<body>

    <header>

        <div class="header-container">

            <a href="index.html">
                <img src="imagens/logo.png" alt="Logo da CBF" class="logo">
            </a>

            <nav class="menu">
                <a href="index.html">Início</a>
                <a href="titulos.html">Títulos</a>
                <a href="maiores_jogadores.html">Jogadores</a>
                <a href="curiosidades.html">Curiosidades</a>

        </p>

        <h2>
            Nosso site foi criado para informar e entreter os fãs da seleção canarinho.
        </h2>

    <footer>

    </footer>
